name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.1)'
        required: true
      build_number:
        description: 'Build number'
        required: true

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Clean up
          rm certificate.p12

      - name: Set up Notarization Credentials
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD"

      - name: Set up Sparkle Private Key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > sparkle_private_key

      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "BUILD_NUMBER=${{ github.event.inputs.build_number }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Update build script configuration
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          # Update signing identity in build script
          sed -i '' 's/SIGNING_IDENTITY=".*"/SIGNING_IDENTITY="'"$SIGNING_IDENTITY"'"/' build-and-release.sh

      - name: Build, Sign, and Notarize
        env:
          KEYCHAIN_PROFILE: notarytool-profile
        run: |
          chmod +x build-and-release.sh
          ./build-and-release.sh \
            -v ${{ steps.version.outputs.VERSION }} \
            -b ${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Hard Linker v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            releases/Hard-Linker-${{ steps.version.outputs.VERSION }}.zip
          body: |
            ## Hard Linker v${{ steps.version.outputs.VERSION }}

            ### Download
            Download the .zip file below and move Hard Linker.app to your Applications folder.

            ### Updates
            This version includes automatic update support. Users with previous versions can update via the "Check for Updates" menu item.

            ### Changes
            See the commit history for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Appcast on GitHub Pages
        run: |
          cp appcast.xml /tmp/hard-linker-appcast.xml

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Publish the appcast generated by the release script
          cp /tmp/hard-linker-appcast.xml appcast.xml

          # Commit and push
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to publish"
          else
            git commit -m "Update appcast for v${{ steps.version.outputs.VERSION }}"
            git push origin gh-pages
          fi

      - name: Cleanup
        if: always()
        run: |
          # Remove private key
          rm -f sparkle_private_key

          # Delete temporary keychain
          security delete-keychain build.keychain || true
